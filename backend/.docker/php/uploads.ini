; PHP runtime overrides for RingLink — copied into
; /usr/local/etc/php/conf.d/zz-uploads.ini by the production Dockerfile.
;
; Default php-fpm-alpine ships with upload_max_filesize=2M and
; post_max_size=8M, which would cap wrestler photo uploads at 2 MB even
; though the API advertises a 10 MB limit. Bump them so the validated
; max (image,max:10240) is what users actually hit.
upload_max_filesize = 16M
post_max_size = 24M
memory_limit = 256M
max_execution_time = 60
