services:
  app:
    image: php:8.4-fpm
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "php-fpm"
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ringlink
      MYSQL_USER: ringlink
      MYSQL_PASSWORD: ringlink
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  queue-worker:
    image: php:8.4-cli
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "while true; do php artisan queue:work --sleep=3 --tries=3; sleep 1; done"
    depends_on:
      - app
      - redis

  scheduler:
    image: php:8.4-cli
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      - app

volumes:
  mysql_data:
