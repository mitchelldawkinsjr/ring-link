services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: ringlink-app-dev
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    # Default 8000 — change if busy: `RINGLINK_NGINX_PORT=8080 docker compose up -d`
    ports:
      - "${RINGLINK_NGINX_PORT:-8000}:80"
    volumes:
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ringlink
      MYSQL_USER: ringlink
      MYSQL_PASSWORD: ringlink
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uringlink -pringlink --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  queue-worker:
    image: ringlink-app-dev
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: sh -lc "php artisan queue:work --sleep=3 --tries=3"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_started

  scheduler:
    image: ringlink-app-dev
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    depends_on:
      app:
        condition: service_started

volumes:
  mysql_data:
