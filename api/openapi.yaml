openapi: 3.1.0
info:
  title: RingLink API
  version: 1.0.0
  description: Wrestling talent marketplace MVP (`/api/v1`). Bearer Sanctum personal access tokens.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      security: []
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
  /auth/login:
    post:
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeError'
  /auth/logout:
    post:
      summary: Logout (revoke current token)
      responses:
        '200':
          description: OK
  /auth/me:
    get:
      summary: Current user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
  /wrestlers:
    get:
      security: []
      summary: Search wrestlers
      parameters:
        - in: query
          name: state
          schema:
            type: string
            minLength: 2
            maxLength: 2
        - in: query
          name: wrestling_style
          schema:
            type: string
        - in: query
          name: per_page
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
    post:
      summary: Create wrestler profile
      responses:
        '201':
          description: Created
  /wrestlers/{wrestlerProfile}:
    get:
      security: []
      summary: Show wrestler profile
      parameters:
        - $ref: '#/components/parameters/WrestlerProfileId'
      responses:
        '200':
          description: OK
    patch:
      summary: Update wrestler profile
      parameters:
        - $ref: '#/components/parameters/WrestlerProfileId'
      responses:
        '200':
          description: OK
  /promotions:
    get:
      security: []
      summary: List promotions
      responses:
        '200':
          description: OK
    post:
      summary: Create promotion profile
      responses:
        '201':
          description: Created
  /promotions/{promotionProfile}:
    get:
      security: []
      summary: Show promotion
      parameters:
        - $ref: '#/components/parameters/PromotionProfileId'
      responses:
        '200':
          description: OK
    patch:
      summary: Update promotion profile
      parameters:
        - $ref: '#/components/parameters/PromotionProfileId'
      responses:
        '200':
          description: OK
  /promotion/events:
    get:
      summary: List my events
      responses:
        '200':
          description: OK
    post:
      summary: Create event
      responses:
        '201':
          description: Created
  /promotion/events/{event}:
    patch:
      summary: Update event
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: OK
    delete:
      summary: Delete event
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '200':
          description: OK
  /submissions:
    post:
      summary: Create submission
      responses:
        '201':
          description: Created
  /submissions/{submission}/status:
    patch:
      summary: Transition submission status
      parameters:
        - $ref: '#/components/parameters/SubmissionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum:
                    - submitted
                    - reviewing
                    - interested
                    - offer_sent
                    - accepted
                    - declined
                    - booked
                    - completed
                    - cancelled
      responses:
        '200':
          description: OK
  /bookings:
    post:
      summary: Create booking from accepted submission
      responses:
        '201':
          description: Created
  /bookings/{booking}/status:
    patch:
      summary: Transition booking status
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, in_progress, completed, cancelled]
      responses:
        '200':
          description: OK
  /reviews:
    post:
      summary: Create verified booking review
      responses:
        '201':
          description: Created
  /reviews/{verifiedBookingReview}/moderation:
    patch:
      summary: Moderate review (admin)
      parameters:
        - name: verifiedBookingReview
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [moderation_status]
              properties:
                moderation_status:
                  type: string
                  enum: [pending, approved, rejected]
      responses:
        '200':
          description: OK
  /conversations:
    get:
      summary: List conversations
      responses:
        '200':
          description: OK
    post:
      summary: Start or open conversation
      responses:
        '201':
          description: Created
  /conversations/{conversation}/messages:
    get:
      summary: List messages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: OK
    post:
      summary: Send message
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '201':
          description: Created
  /messages/{message}/read:
    patch:
      summary: Mark message read
      parameters:
        - $ref: '#/components/parameters/MessageId'
      responses:
        '200':
          description: OK
  /messages/unread-count:
    get:
      summary: Unread messages count
      responses:
        '200':
          description: OK
  /media/upload-intent:
    post:
      summary: Presigned PUT for R2 (or local placeholder)
      responses:
        '200':
          description: OK
  /media/confirm:
    post:
      summary: Confirm media URL stored
      responses:
        '201':
          description: Created
  /media/{mediaLink}:
    delete:
      summary: Delete media link
      parameters:
        - name: mediaLink
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /wrestlers/{wrestlerProfile}/media/order:
    patch:
      summary: Reorder media
      parameters:
        - $ref: '#/components/parameters/WrestlerProfileId'
      responses:
        '200':
          description: OK
  /wrestlers/availability:
    post:
      summary: Add availability window
      responses:
        '201':
          description: Created
  /promotion/saved-talent:
    get:
      summary: List saved talent
      responses:
        '200':
          description: OK
  /promotion/saved-talent/{wrestlerProfile}:
    post:
      summary: Save wrestler
      parameters:
        - $ref: '#/components/parameters/WrestlerProfileId'
      responses:
        '201':
          description: Created
    delete:
      summary: Remove saved wrestler
      parameters:
        - $ref: '#/components/parameters/WrestlerProfileId'
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum personal access token
  parameters:
    WrestlerProfileId:
      name: wrestlerProfile
      in: path
      required: true
      schema:
        type: integer
    PromotionProfileId:
      name: promotionProfile
      in: path
      required: true
      schema:
        type: integer
    EventId:
      name: event
      in: path
      required: true
      schema:
        type: integer
    SubmissionId:
      name: submission
      in: path
      required: true
      schema:
        type: integer
    BookingId:
      name: booking
      in: path
      required: true
      schema:
        type: integer
    ConversationId:
      name: conversation
      in: path
      required: true
      schema:
        type: integer
    MessageId:
      name: message
      in: path
      required: true
      schema:
        type: integer
  schemas:
    EnvelopeError:
      type: object
      properties:
        data: { nullable: true }
        meta:
          type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
        message:
          type: string
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role:
          type: string
          enum: [wrestler, promotion, admin]
        wrestler_profile_id: { type: [integer, 'null'] }
        promotion_profile_id: { type: [integer, 'null'] }
    RegisterRequest:
      type: object
      required: [name, email, password, password_confirmation, role]
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password }
        password_confirmation: { type: string }
        role:
          type: string
          enum: [wrestler, promotion]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }
    AuthResponseEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
        meta:
          type: object
        message:
          type: string
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
        meta:
          type: object
        message:
          type: string
