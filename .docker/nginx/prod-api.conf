# Re-resolve `app` against Docker's embedded DNS so a recreated app
# container with a new IP doesn't strand nginx with a cached upstream.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # TLS is terminated by Nginx Proxy Manager upstream.
    # Trust the X-Forwarded-* headers it sets.
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;

    # Serve wrestler photo uploads (and anything else on the `public` disk)
    # straight from the bind-mounted storage volume so we don't round-trip
    # through PHP-FPM for static assets. The storage dir is mounted read-only
    # at /var/www/html/storage in docker-compose.
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Variable forces re-resolution of `app` at request time.
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS $http_x_forwarded_proto;
        fastcgi_read_timeout 120;
    }
}
